name: Sentinel-AML Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/agent-*'
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate Code and Infrastructure
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r infrastructure/requirements.txt
    
    - name: Install CDK
      run: npm install -g aws-cdk
    
    - name: Lint Python code
      run: |
        pip install flake8 black isort
        flake8 src/ tests/ --max-line-length=100
        black --check src/ tests/
        isort --check-only src/ tests/
    
    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --cov=src --cov-report=xml
    
    - name: Run property tests
      run: |
        python -m pytest tests/property/ -v --maxfail=5
    
    - name: Validate CDK syntax
      run: |
        cd infrastructure
        cdk synth --all
    
    - name: Security scan
      uses: github/super-linter@v4
      env:
        DEFAULT_BRANCH: main
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VALIDATE_PYTHON_FLAKE8: true
        VALIDATE_PYTHON_BLACK: true
        VALIDATE_DOCKERFILE: true
        VALIDATE_YAML: true
        VALIDATE_JSON: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install moto[all] pytest-mock
    
    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --maxfail=3
      env:
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [validate, test-integration]
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r infrastructure/requirements.txt
        npm install -g aws-cdk
    
    - name: Create deployment snapshot
      run: |
        python scripts/deploy.py --environment development --action snapshot
    
    - name: Deploy infrastructure
      run: |
        python scripts/deploy.py --environment development --action deploy
    
    - name: Validate deployment
      run: |
        python scripts/deploy.py --environment development --action validate-deployment
    
    - name: Run smoke tests
      run: |
        python -m pytest tests/smoke/ -v --environment=development

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, test-integration]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r infrastructure/requirements.txt
        npm install -g aws-cdk
    
    - name: Create deployment snapshot
      run: |
        python scripts/deploy.py --environment production --action snapshot
    
    - name: Deploy infrastructure (Blue/Green)
      run: |
        # Deploy to blue environment first
        python scripts/deploy.py --environment production --action deploy
    
    - name: Validate production deployment
      run: |
        python scripts/deploy.py --environment production --action validate-deployment
    
    - name: Run production smoke tests
      run: |
        python -m pytest tests/smoke/ -v --environment=production
    
    - name: Notify deployment success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "✅ Sentinel-AML production deployment successful"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Notify deployment failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "❌ Sentinel-AML production deployment failed"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  cleanup:
    name: Cleanup Old Resources
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy-production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Cleanup old snapshots
      run: |
        python scripts/deploy.py --environment production --action cleanup