# Development environment configuration for Sentinel-AML

# Application settings
app:
  name: "Sentinel-AML"
  version: "0.1.0"
  environment: "development"
  debug: true

# Logging configuration
logging:
  level: "DEBUG"
  format: "json"
  enable_correlation_id: true
  
# AWS configuration
aws:
  region: "us-east-1"
  profile: "default"
  
# Neptune configuration
neptune:
  endpoint: "localhost"  # For local development
  port: 8182
  use_ssl: false
  max_connections: 5
  connection_timeout: 30
  
# Bedrock configuration  
bedrock:
  region: "us-east-1"
  model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
  max_tokens: 4000
  temperature: 0.1
  
# ML model configuration
ml:
  gnn_threshold: 0.7
  max_graph_nodes: 10000  # Smaller for development
  inference_timeout: 30
  feature_importance_threshold: 0.1
  
# API configuration
api:
  host: "0.0.0.0"
  port: 8000
  rate_limit: 1000  # Higher for development
  cors_origins: ["*"]
  enable_docs: true
  
# Processing configuration
processing:
  max_concurrent_transactions: 100  # Lower for development
  batch_size: 50
  retry_attempts: 2
  retry_backoff: 1.0
  
# Security configuration (development - not for production)
security:
  jwt_secret: "dev-secret-key-change-in-production"
  jwt_expiration: 86400  # 24 hours
  api_key_required: false  # Disabled for development
  
# Compliance configuration
compliance:
  audit_enabled: true
  pii_masking: true
  data_retention_days: 30  # Shorter for development
  
# Monitoring configuration
monitoring:
  metrics_enabled: true
  tracing_enabled: true
  health_check_interval: 30
  
# Development-specific settings
development:
  auto_reload: true
  mock_external_services: true
  sample_data_enabled: true
  test_mode: false